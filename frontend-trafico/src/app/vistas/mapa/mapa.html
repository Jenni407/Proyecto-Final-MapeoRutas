
<div class="dashboard-wrapper">
  <app-header></app-header>

  <main class="dashboard-grid">
    <aside class="sidebar-column">
      
      <div class="search-card">
        <h3><i class="fas fa-route"></i> Planificar Ruta</h3>
        
        <div class="input-group">
          <label>Punto de partida</label>
          <input type="text" [(ngModel)]="origen" placeholder="Ej: Quiché" class="map-input">
        </div>

        <div class="input-group">
          <label>Destino</label>
          <input type="text" [(ngModel)]="destino" placeholder="Ej: Antigua Guatemala" class="map-input">
        </div>

        <div class="button-actions">
          <button (click)="buscarRuta()" class="btn-buscar">Trazar Ruta</button>
          <button (click)="limpiarRuta()" class="btn-limpiar" *ngIf="rutaTrazada">Limpiar</button>
        </div>
      </div>

      <div class="route-details-card" *ngIf="rutaTrazada && infoRuta">
        <div class="detail-header">
          <span class="badge-mejor">MEJOR</span>
          <h4 class="tiempo-total">{{ infoRuta.tiempo }}</h4>
        </div>
        <p class="llegada-estimada">Llegada a las {{ infoRuta.horaLlegada }}</p>
        <p class="distancia-total">{{ infoRuta.distancia }} km</p>
      </div>

    </aside>

    <section class="map-column">
      <div class="map-container-card">
        <div id="map"></div>
      </div>
    </section>
  </main>

  <app-footer></app-footer>
</div>
